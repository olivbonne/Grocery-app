<script type="module">

const APP_VERSION = "v0.30";

  const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}catch(e){ return ""; } })();

/* default categories (ids stay fixed; label/color/order are editable & saved) */
const DEFAULT_CATS = [
  { id:"meat", label:"Meat", emoji:"🥩", color:"#B5402B" },
  { id:"fruit", label:"Fruit", emoji:"🍌", color:"#C98A06" },

/* meat sub-grouping order: beef, lamb, chicken, seafood, then anything else */
const MEAT_SUBS = [
  { id:"beef",    words:["beef","steak","sirloin","ribeye","rib eye","brisket","mince","ground beef","wagyu","veal","chuck"] },
  { id:"lamb",    words:["lamb","mutton"] },

];
const MEAT_ORDER = ["beef","lamb","chicken","seafood","other"];
function meatSub(name){ const n=name.toLowerCase(); for(const s of MEAT_SUBS){ if(s.words.some(w=>n.includes(w))) return s.id; } return "other"; }

const DICT = {
  meat:["chicken","beef","pork","lamb","turkey","duck","sausage","bacon","mince","steak","fish","salmon","prawn","shrimp","tuna","ham","wings","drumstick","thigh","ribs","meatball","mutton","veal","crab","squid","scallop","cod","lobster"],
  fruit:["banana","apple","orange","berries","berry","strawberr","blueberr","raspberr","kiwi","grape","mango","melon","watermelon","pineapple","peach","pear","plum","lemon","lime","avocado","cherry","papaya","dragonfruit","lychee","longan"],
  vegetable:["ginger","broccoli","brocollini","broccolini","choysum","choy sum","bok choy","pak choi","kailan","kangkung","tomato","spinach","mushroom","pumpkin","squash","green bean","bean sprout","taugeh","cabbage","chilli","chili","carrot","potato","onion","garlic","shallot","lettuce","cucumber","capsicum","zucchini","corn","celery","kale","leek","eggplant","cauliflower","radish","beetroot","asparagus","coriander","cilantro","basil","spring onion","scallion","lemongrass"],
  fresh:["milk","egg","yogurt","yoghurt","cheese","parmesan","butter","bread","cream","juice","hummus","margarine","croissant","bagel","baguette"],
  bulk:["floss","sparkling water","water","salt","sugar","flour","rice","pasta","spaghetti","oil","vinegar","shampoo","conditioner","soap","toothpaste","toothbrush","tissue","toilet paper","paper towel","kitchen towel","detergent","sponge","cereal","oats","coffee","tea","honey","peanut butter","jam","ketchup","mayo","mustard","stock","canned","chickpea","lentil","battery","foil","popcorn","chocolate chip"],
  asian:["kimchi","ramen","noodle","noodles","udon","soba","soy sauce","miso","gochujang","gochugaru","nori","seaweed","dumpling","gyoza","wonton","fish sauce","oyster sauce","sesame oil","sesame","curry paste","tofu","tempeh","mirin","dashi","wasabi","sriracha","sambal","laksa","pho","jin ramen","shin ramen"],
  alcohol:["wine","beer","vodka","whisky","whiskey","gin","rum","soju","sake","cider","champagne","prosecco","tequila"],
  health:["vitamin","panadol","paracetamol","ibuprofen","medicine","bandage","band-aid","plaster","supplement","probiotic","sunscreen","cough","lozenge","melatonin","fish oil","magnesium"],
};
function guessCat(name){ const n=name.toLowerCase();
  for(const[c,w] of Object.entries(DICT)) if(w.some(x=>n.includes(x))) return c; return null; }

function parseEntry(raw){ let s=raw.trim(); let m=s.match(/^(\d+)\s*[x×]?\s+(.+)$/i);
  if(m) return {qty:parseInt(m[1],10)||1,name:m[2].trim()};
  m=s.match(/^(.+?)\s*[x×]\s*(\d+)$/i); if(m) return {qty:parseInt(m[2],10)||1,name:m[1].trim()};
  return {qty:1,name:s}; }

const uid = () => Math.random().toString(36).slice(2,9)+Date.now().toString(36);

/* ---- list code: from URL, else remembered on this device, else new ---- */
const params = new URLSearchParams(location.search);
const LS_LASTLIST = "ml_lastlist";
let listCode = params.get("list") || localStorage.getItem(LS_LASTLIST) || uid().slice(0,8);
localStorage.setItem(LS_LASTLIST, listCode);
if(params.get("list") !== listCode){ params.set("list", listCode);
  history.replaceState(null,"",location.pathname+"?"+params.toString()); }

const LS = { me:"ml_me", collapse:"ml_collapse_"+listCode, cache:"ml_cache_"+listCode };
let me = localStorage.getItem(LS.me) || null;
let collapse = JSON.parse(localStorage.getItem(LS.collapse) || '{"cats":[],"ba":false}');
let density = parseFloat(localStorage.getItem("ml_density")||"1") || 1;
function setDensity(d){ density=Math.min(1.3,Math.max(0.7,Math.round(d*10)/10)); localStorage.setItem("ml_density",density); render(); }
let theme = localStorage.getItem("ml_theme") || "dark";
function applyTheme(){ document.body.classList.toggle("dark", theme==="dark"); }
function toggleTheme(){ theme = theme==="dark" ? "light" : "dark"; localStorage.setItem("ml_theme", theme); applyTheme(); render(); }
applyTheme();
let soundOn = localStorage.getItem("ml_sound")==="1";
let __ac=null;
function playTick(up){ if(!soundOn) return;
  try { __ac = __ac || new (window.AudioContext||window.webkitAudioContext)(); if(__ac.state==="suspended") __ac.resume();

function labelMap(){ const m={}; DEFAULT_CATS.forEach(c=>m[c.label.toLowerCase()]=c.id);

  Object.assign(m,{veg:"vegetable",vegetables:"vegetable",veggies:"vegetable",fruits:"fruit"}); return m; }
function parseInput(text){ const map=labelMap();
  const labels=Object.keys(map).map(s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
  const re=new RegExp('\\s*\\b('+labels+')\\s*:','gi');
  const norm=text.replace(re,(m,l)=>'\n'+l+':');
  const out=[];
  for(const raw of norm.split(/\n/)){ const line=raw.trim(); if(!line) continue;
    let forced=null,rest=line; const c=line.indexOf(":");
    if(c!==-1){ const lab=line.slice(0,c).trim().toLowerCase(); if(map[lab]){ forced=map[lab]; rest=line.slice(c+1);} }
    for(const tok of rest.split(",").map(s=>s.trim()).filter(Boolean)){ const{qty,name}=parseEntry(tok); if(name) out.push({name,qty,cat:forced}); }
  } return out; }

/* ---- voice input (Web Speech API) ---- */
let recog=null, listening=false, micFinal="";
function setMicUI(on){ const b=document.getElementById("micBtn"); if(b) b.style.backgroundImage = on ? "url('mic-on.png')" : "";
  const f=micField(); if(f) f.style.color = on ? "var(--accent)" : ""; }
function micField(){ return document.getElementById("mainInput"); }
function grow(el){ if(!el) return; el.style.height="auto"; el.style.height=Math.min(el.scrollHeight+4,180)+"px"; }
function suggestPool(){
  const seen=new Set(), out=[];
  const add=n=>{ const k=(n||"").toLowerCase().trim(); if(k && !seen.has(k)){ seen.add(k); out.push(n); } };
  state.buyAgain.forEach(e=>add(e.name));   // recently bought first
  state.items.forEach(i=>add(i.name));      // already on the list
  Object.values(DICT).forEach(arr=>arr.forEach(add)); // common groceries fallback
  return out;
}
function renderSuggest(){
  const box=document.getElementById("suggest"), mi=micField(); if(!box||!mi){ return; }
  const v=mi.value, idx=Math.max(v.lastIndexOf(","), v.lastIndexOf("\n"));
  const frag=v.slice(idx+1).trim().toLowerCase();
  if(frag.length<1){ box.innerHTML=""; return; }
  const pool=suggestPool();
  const starts=pool.filter(n=>n.toLowerCase().startsWith(frag));
  const incl=pool.filter(n=>!n.toLowerCase().startsWith(frag) && n.toLowerCase().includes(frag));
  const list=[...starts,...incl].filter(n=>n.toLowerCase()!==frag).slice(0,8);
  if(!list.length){ box.innerHTML=""; return; }
  box.innerHTML=list.map(n=>`<button class="sugchip" data-sug="${esc(n)}">${esc(n)}</button>`).join("");
  box.querySelectorAll("[data-sug]").forEach(b=>{
    b.onpointerdown=e=>e.preventDefault();   // keep keyboard up
    b.onclick=()=>{ const name=b.dataset.sug; const cur=mi.value;
      const i=Math.max(cur.lastIndexOf(","), cur.lastIndexOf("\n"));
      const head=i>=0 ? cur.slice(0,i+1).replace(/\s*$/,"")+" " : "";
      mi.value=head+name+", "; grow(mi); mi.focus(); box.innerHTML=""; };
  });
}
function startMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showToast("Voice input isn't supported here — tap the 🎤 on your keyboard instead"); return; }
  const mi = micField(); if(!mi) return;
  micFinal = mi.value ? mi.value.replace(/\s*,?\s*$/,"")+", " : "";
  recog = new SR(); recog.lang = navigator.language || "en-US"; recog.interimResults = true; recog.continuous = false;
  recog.onresult = e => {
    let interim = "";
    for(let i=e.resultIndex; i<e.results.length; i++){ const r=e.results[i]; const tx=(r[0].transcript||"").trim();
      if(r.isFinal){ if(tx) micFinal += tx + ", "; } else { interim += r[0].transcript; } }
    const m=micField(); if(m){ m.value = (micFinal + interim).replace(/,\s*,/g, ", "); grow(m); }
  };
  recog.onerror = ev => {
    if(ev.error==="not-allowed"||ev.error==="service-not-allowed"){ showToast("Allow microphone access to use voice input"); listening=false; }
    else if(ev.error==="no-speech"){ /* keep listening */ }
    else { showToast("Voice error: "+ev.error); }
  };
  recog.onend = () => {
    if(listening){ try{ recog.start(); }catch(e){ listening=false; setMicUI(false); } }
    else { setMicUI(false); const m=micField(); if(m) m.value=m.value.replace(/,\s*$/,""); }
  };
  try { recog.start(); listening=true; setMicUI(true); showToast("Listening… tap 🎤 again to stop"); }
  catch(e){ listening=false; setMicUI(false); showToast("Couldn't start voice input"); }
}
function stopMic(){ listening=false; if(recog){ try{ recog.stop(); }catch(e){} }
  setMicUI(false); const m=micField(); if(m) m.value=m.value.replace(/,\s*$/,""); }
function toggleMic(){ if(listening) stopMic(); else startMic(); }

       <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">
         <button class="catchip" data-es="" style="${!editing.sub?`background:var(--btn);border-color:var(--btn);color:#fff`:''}">None</button>
         ${selCat.subs.map(s=>`<button class="catchip" data-es="${s.id}" style="${editing.sub===s.id?`background:${selCat.color};border-color:${selCat.color};color:#fff`:''}">${esc(s.label)}</button>`).join("")}
       </div>` : "";
  return `<div class="sheet-bg" id="sheetBg"><div class="sheet" id="sheet">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="disp" style="font-weight:800;font-size:17px">${isItem?"Edit item":"Edit saved item"}</div>
      ${isItem?`<button id="starBtn" aria-label="Star" style="border:none;background:transparent;font-size:24px;line-height:1;padding:2px;color:${editing.starred?'#E8A91D':'var(--muted2)'}">${editing.starred?'★':'☆'}</button>`:""}
    </div>
    <div style="display:flex;gap:6px;align-items:stretch">
      <input id="editName" value="${esc(editing.name)}" style="flex:1;min-width:0;height:46px;padding:0 12px;border-radius:14px;border:2px solid var(--ink);outline:none;background:var(--card);color:var(--ink);font-size:15px" />
      <select id="weightSel" style="width:80px;flex:none;height:46px;padding:0 4px;border-radius:14px;border:2px solid var(--ink);background:var(--card);color:var(--ink);font-size:14px;font-weight:600">
        ${["","100g","200g","300g","400g","500g","600g","700g","800g","900g","1kg","2kg","3kg","4kg","5kg","10kg"].map(w=>{ const hl=(w==="500g"||w==="1kg"); return `<option value="${w}" ${(editing.weight||"")===w?'selected':''}>${w?(hl?'★ '+w:w):''}</option>`; }).join("")}
      </select>
      <div class="qstep" style="height:46px;align-items:center"><button id="qMinus">−</button><span style="min-width:22px;text-align:center;font-weight:800;font-size:16px">${editing.qty||1}</span><button id="qPlus">+</button></div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">${chipsHTML(editing.cat)}</div>
    ${subChips}
    <div style="display:flex;gap:8px;margin-top:16px">
      <button id="secBtn" style="${btnSecStyle}">${secLabel}</button>
      <button id="delBtn" style="${btnDelStyle}">Delete</button>
      <button id="saveBtn" style="${btnSaveStyle}">Save</button>
    </div>
  </div></div>`;
}

function wire(){
  const mi=app.querySelector("#mainInput"), ma=app.querySelector("#mainAdd");
  const mc=app.querySelector("#mainClear");
  const toggleClear=(el,btn)=>{ if(btn) btn.classList.toggle("show", !!(el&&el.value.trim())); };
  if(mi){ mi.value=draftMain; grow(mi); toggleClear(mi,mc);
    mi.oninput=()=>{ draftMain=mi.value; grow(mi); renderSuggest(); toggleClear(mi,mc); };
    mi.onkeydown=e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); stopMic(); addEntries(mi.value,null); mi.value=""; draftMain=""; grow(mi); document.getElementById("suggest").innerHTML=""; toggleClear(mi,mc); mi.focus(); } };
    mi.onpaste=e=>{ const t=(e.clipboardData||window.clipboardData).getData("text");
      const looksLikeBlock = t && (t.indexOf("\n")>=0 || /\b(meat|fruit|vegetable|veg|fresh|bulk|asian|alcohol|health|others)\s*:/i.test(t) || t.split(",").length>2);
      if(looksLikeBlock){ e.preventDefault(); addEntries(t,null); mi.value=""; draftMain=""; grow(mi); document.getElementById("suggest").innerHTML=""; toggleClear(mi,mc); } }; }
  if(mc){ mc.onpointerdown=e=>e.preventDefault(); mc.onclick=()=>{ if(mi){ mi.value=""; draftMain=""; grow(mi); document.getElementById("suggest").innerHTML=""; toggleClear(mi,mc); mi.focus(); } }; }
  if(ma){ ma.onpointerdown=e=>e.preventDefault(); ma.onclick=()=>{ stopMic(); addEntries(mi.value,null); mi.value=""; draftMain=""; grow(mi); const sg=document.getElementById("suggest"); if(sg) sg.innerHTML=""; toggleClear(mi,mc); mi.focus(); }; }
  const mb=app.querySelector("#micBtn"); if(mb){ mb.onclick=toggleMic; setMicUI(listening); }
  const ca=app.querySelector("#collapseAll"); if(ca) ca.onclick=()=>{ const ids=catList().filter(c=>state.items.some(i=>i.cat===c.id)).map(c=>c.id);
    const anyOpen=ids.some(id=>!collapse.cats.includes(id));
    collapse.cats = anyOpen ? ids.slice() : [];
    localStorage.setItem(LS.collapse, JSON.stringify(collapse)); render(); };

  /* item pills: tap = check, hold = edit */
  app.querySelectorAll("[data-pill]").forEach(b=>{ const id=b.dataset.pill;
    b.oncontextmenu=e=>e.preventDefault();
    b.onpointerdown=pressStart; b.onpointerleave=pressCancel; b.onpointercancel=pressCancel;
    b.onpointerup=()=>{ pressCancel(); const it=state.items.find(i=>i.id===id); if(!it) return;
      if(longFired){ editing={kind:"item", ...it}; render(); } else { toggleItem(id); } }; });

  /* category header: tap = collapse, hold = edit/reorder/remove */
  app.querySelectorAll("[data-cat]").forEach(b=>{ const id=b.dataset.cat;
    const has=state.items.some(i=>i.cat===id);
    b.oncontextmenu=e=>e.preventDefault();
    b.onpointerdown=pressStart; b.onpointerleave=pressCancel; b.onpointercancel=pressCancel;
    b.onpointerup=()=>{ pressCancel(); if(longFired){ const c=CAT(id); editing={kind:"cat", id, label:c.label, emoji:c.img?"":(c.emoji||""), img:c.img||"", color:c.color, iconManual:!!c.img}; render(); }
      else if(has){ toggleCat(id); } }; });

  app.querySelectorAll("[data-add]").forEach(b=>{ const id=b.dataset.add;
    b.onclick=()=>{ if(catEntry===id){ catEntry=null; } else { catEntry=id; draftCatText=""; } render(); const ci=app.querySelector("#catInput"); if(ci) ci.focus(); }; });
  const ci=app.querySelector("#catInput"), cab=app.querySelector("#catAddBtn"), cc=app.querySelector("#catClear");
  const toggleCC=()=>{ if(cc) cc.classList.toggle("show", !!(ci&&ci.value.trim())); };
  if(ci){ ci.value=draftCatText; ci.focus(); grow(ci); toggleCC();
    ci.oninput=()=>{ draftCatText=ci.value; grow(ci); toggleCC(); };
    ci.onkeydown=e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); addEntries(ci.value,catEntry); ci.value=""; draftCatText=""; grow(ci); toggleCC(); ci.focus(); } }; }
  if(cc){ cc.onpointerdown=e=>e.preventDefault(); cc.onclick=()=>{ if(ci){ ci.value=""; draftCatText=""; grow(ci); toggleCC(); ci.focus(); } }; }
  if(cab){ cab.onpointerdown=e=>e.preventDefault(); cab.onclick=()=>{ const v=app.querySelector("#catInput").value; addEntries(v,catEntry); draftCatText=""; render(); const x=app.querySelector("#catInput"); if(x){ x.focus(); grow(x); } }; }

  const sb=app.querySelector("#sweepBtn"); if(sb) sb.onclick=sweep;
  const bh=app.querySelector("#baHead"); if(bh) bh.onclick=toggleBA;

  /* buy-again: tap = restore, hold = edit (remove lives inside the edit popup) */
  app.querySelectorAll(".ba-restore").forEach(b=>{ const [name,cat]=b.dataset.restore.split("|");
    b.oncontextmenu=e=>e.preventDefault();
    b.onpointerdown=pressStart; b.onpointerleave=pressCancel; b.onpointercancel=pressCancel;
    b.onpointerup=()=>{ pressCancel();
      if(longFired){ const en=state.buyAgain.find(x=>x.name===name && x.cat===cat); editing={kind:"ba", name, cat, qty:(en?en.qty||1:1), origName:name, origCat:cat}; render(); }
      else { restore(name,cat); } }; });
  const cba=app.querySelector("#clearBA"); if(cba) cba.onclick=()=>{ state.buyAgain=[]; save(); render(); };

  const dm=app.querySelector("#denMinus"); if(dm) dm.onclick=()=>setDensity(density-0.1);
  const dp=app.querySelector("#denPlus"); if(dp) dp.onclick=()=>setDensity(density+0.1);
  const tb=app.querySelector("#themeBtn"); if(tb) tb.onclick=toggleTheme;
  const snd=app.querySelector("#soundBtn"); if(snd) snd.onclick=toggleSound;
  const ac=app.querySelector("#addCat"); if(ac) ac.onclick=addCategory;

  const cl=app.querySelector("#copyLink2"); if(cl) cl.onclick=copyLink;
  const su=app.querySelector("#switchUser"); if(su) su.onclick=()=>{ localStorage.removeItem(LS.me); me=null; render(); };

  if(editing){
    const bg=app.querySelector("#sheetBg"); if(bg) bg.onclick=()=>{ editing=null; render(); };
    const sh=app.querySelector("#sheet"); if(sh) sh.onclick=e=>e.stopPropagation();
    if(editing.kind==="newcat"){
      const cn=app.querySelector("#catName"); if(cn) cn.oninput=e=>{ editing.label=e.target.value; refreshStrip(); };
      wireIconEditor();
      const cc=app.querySelector("#newCreate"); if(cc) cc.onclick=createCategoryFromSheet;
      const cx=app.querySelector("#newCancel"); if(cx) cx.onclick=()=>{ editing=null; render(); };
    } else if(editing.kind==="cat"){
      const cn=app.querySelector("#catName"); if(cn) cn.oninput=e=>{ editing.label=e.target.value; refreshStrip(); };
      wireIconEditor();
      const mu=app.querySelector("#moveUp"); if(mu) mu.onclick=()=>{ saveCatEditQuiet(); const cs=catList(); const i=cs.findIndex(c=>c.id===editing.id); moveCat(editing.id,i-1); };
      const md=app.querySelector("#moveDown"); if(md) md.onclick=()=>{ saveCatEditQuiet(); const cs=catList(); const i=cs.findIndex(c=>c.id===editing.id); moveCat(editing.id,i+1); };
      const asb=app.querySelector("#addSubBtn"); if(asb) asb.onclick=()=>{ saveCatEditQuiet(); addSub(editing.id); };
      app.querySelectorAll("[data-sublabel]").forEach(inp=>{ inp.onchange=()=>{ const c=catList().find(x=>x.id===editing.id); const s=c&&c.subs.find(z=>z.id===inp.dataset.sublabel); if(s){ s.label=(inp.value||"").trim()||s.label; save(); } }; });
      if(pendingSubFocus){ const ni=app.querySelector(`[data-sublabel="${pendingSubFocus}"]`); pendingSubFocus=null; if(ni){ ni.focus(); } }
      app.querySelectorAll("[data-subup]").forEach(b=>b.onclick=()=>{ saveCatEditQuiet(); moveSub(editing.id,b.dataset.subup,-1); });
      app.querySelectorAll("[data-subdown]").forEach(b=>b.onclick=()=>{ saveCatEditQuiet(); moveSub(editing.id,b.dataset.subdown,1); });
      app.querySelectorAll(".subdel").forEach(b=>b.onclick=()=>{ saveCatEditQuiet(); removeSub(editing.id, b.dataset.sub); });
      const cr=app.querySelector("#catRemove"); if(cr) cr.onclick=()=>removeCat(editing.id);
      const csv=app.querySelector("#catSave"); if(csv) csv.onclick=saveCatEdit;
    } else {
      const en=app.querySelector("#editName"); if(en) en.oninput=e=>editing.name=e.target.value;
      const ws=app.querySelector("#weightSel"); if(ws) ws.onchange=e=>{ editing.weight=e.target.value; };
      const stb=app.querySelector("#starBtn"); if(stb) stb.onclick=()=>{ editing.starred=!editing.starred; render(); };
      const qm=app.querySelector("#qMinus"); if(qm) qm.onclick=()=>{ editing.qty=Math.max(1,(editing.qty||1)-1); render(); };
      const qp=app.querySelector("#qPlus"); if(qp) qp.onclick=()=>{ editing.qty=(editing.qty||1)+1; render(); };
      app.querySelectorAll("[data-ec]").forEach(b=>b.onclick=()=>{ editing.cat=b.dataset.ec; editing.sub=null; render(); });
      app.querySelectorAll("[data-es]").forEach(b=>b.onclick=()=>{ editing.sub=b.dataset.es||null; render(); });
      const sec=app.querySelector("#secBtn"); if(sec) sec.onclick=()=> editing.kind==="item" ? removeEditing() : restoreEditingToList();
      const del=app.querySelector("#delBtn"); if(del) del.onclick=()=> editing.kind==="item" ? deleteItemEditing() : removeBAfromSheet();
      const sv=app.querySelector("#saveBtn"); if(sv) sv.onclick=()=> editing.kind==="item" ? saveEdit() : saveBA();
    }
  }
}

render();
</script>
</body>
</html>
