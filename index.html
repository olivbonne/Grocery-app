<script>
/* Only surfaces an error if the app genuinely never started.
   Ignores opaque cross-origin "Script error." noise and anything after first render. */
window.__mlRendered = false;
function __mlShow(msg){ var el=document.getElementById('app');
  if(el) el.innerHTML='<div style="padding:28px 22px;font:15px/1.5 -apple-system,system-ui,sans-serif;color:var(--ink)">'
   +'<b>Still loading…</b><br><br>If this keeps happening, re-check your Firebase setup: make sure <b>only the config values</b> were pasted '
   +'(no line with <code>getAnalytics</code>, <code>firebase/analytics</code>, or a second <code>const app</code>), '
   +'and that the <b>Firestore database rules were published</b>.<br><br>'
   +'<span style="color:#C24A33;word-break:break-word">'+msg+'</span></div>'; }
window.addEventListener('error', function(e){
  if(window.__mlRendered) return;                       // app already up — ignore stray errors
  var msg=(e&&e.message)||'';
  if(msg.indexOf('Script error')===0) return;           // opaque cross-origin event, not actionable
  __mlShow(msg||'Unknown error');
});
window.addEventListener('unhandledrejection', function(e){
  if(window.__mlRendered) return;
  var r=e&&e.reason; __mlShow((r&&r.message)?r.message:String(r));
});
setTimeout(function(){ if(!window.__mlRendered){ var el=document.getElementById('app');
  if(el && /Opening the list/.test(el.textContent||'')) __mlShow('The list did not load.'); } }, 7000);
</script>

  .qstep button { width:36px; border:none; background:transparent; font-size:20px; font-weight:700; color:var(--ink); }
  .catchip { padding:7px 11px; border-radius:999px; border:2px solid var(--line); background:var(--card); color:var(--ink);

</style>

<div id="app"><div class="center">Opening the list…</div></div>
<script type="module">
/* ============ Firebase config — PASTE YOURS HERE ============ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "REPLACE_ME",
  authDomain: "REPLACE_ME.firebaseapp.com",
  projectId: "REPLACE_ME",
  storageBucket: "REPLACE_ME.appspot.com",
  messagingSenderId: "REPLACE_ME",
  appId: "REPLACE_ME"
};
/* ============================================================ */

/* default categories (ids stay fixed; label/color/order are editable & saved) */
const DEFAULT_CATS = [
  { id:"meat", label:"Meat", emoji:"🥩", color:"#B5402B" },
  { id:"fruit", label:"Fruit", emoji:"🍌", color:"#C98A06" },
  { id:"vegetable", label:"Vegetable", emoji:"🥦", color:"#3E7C3A" },
  { id:"fresh", label:"Fresh", emoji:"🥛", color:"#2E6FA3" },
  { id:"bulk", label:"Bulk", emoji:"🧻", color:"#6B5CA5" },
  { id:"health", label:"Health", emoji:"💊", color:"#2E8C7F" },
  { id:"asian", label:"Asian", emoji:"🍜", color:"#C73B5B" },
  { id:"alcohol", label:"Alcohol", emoji:"🍷", color:"#8A5A2B" },
  { id:"others", label:"Others", emoji:"🛒", color:"#5B6770" },
];

/* meat sub-grouping order: beef, lamb, chicken, seafood, then anything else */
const MEAT_SUBS = [
  { id:"beef",    words:["beef","steak","sirloin","ribeye","rib eye","brisket","mince","ground beef","wagyu","veal","chuck"] },
  { id:"lamb",    words:["lamb","mutton"] },
  { id:"chicken", words:["chicken","thigh","drumstick","wing","poultry","breast"] },
  { id:"seafood", words:["fish","salmon","prawn","shrimp","tuna","crab","squid","mussel","oyster","scallop","cod","mackerel","seafood","lobster","clam","anchovy","barramundi","snapper","sardine"] },
];
const MEAT_ORDER = ["beef","lamb","chicken","seafood","other"];
function meatSub(name){ const n=name.toLowerCase(); for(const s of MEAT_SUBS){ if(s.words.some(w=>n.includes(w))) return s.id; } return "other"; }

const DICT = {
  meat:["chicken","beef","pork","lamb","turkey","duck","sausage","bacon","mince","steak","fish","salmon","prawn","shrimp","tuna","ham","wings","drumstick","thigh","ribs","meatball","mutton","veal","crab","squid","scallop","cod","lobster"],
  fruit:["banana","apple","orange","berries","berry","strawberr","blueberr","raspberr","kiwi","grape","mango","melon","watermelon","pineapple","peach","pear","plum","lemon","lime","avocado","cherry","papaya","dragonfruit","lychee","longan"],
  vegetable:["ginger","broccoli","brocollini","broccolini","choysum","choy sum","bok choy","pak choi","kailan","kangkung","tomato","spinach","mushroom","pumpkin","squash","green bean","bean sprout","taugeh","cabbage","chilli","chili","carrot","potato","onion","garlic","shallot","lettuce","cucumber","capsicum","zucchini","corn","celery","kale","leek","eggplant","cauliflower","radish","beetroot","asparagus","coriander","cilantro","basil","spring onion","scallion","lemongrass"],
  fresh:["milk","egg","yogurt","yoghurt","cheese","parmesan","butter","bread","cream","juice","hummus","margarine","croissant","bagel","baguette"],
  bulk:["floss","sparkling water","water","salt","sugar","flour","rice","pasta","spaghetti","oil","vinegar","shampoo","conditioner","soap","toothpaste","toothbrush","tissue","toilet paper","paper towel","kitchen towel","detergent","sponge","cereal","oats","coffee","tea","honey","peanut butter","jam","ketchup","mayo","mustard","stock","canned","chickpea","lentil","battery","foil","popcorn","chocolate chip"],
  asian:["kimchi","ramen","noodle","noodles","udon","soba","soy sauce","miso","gochujang","gochugaru","nori","seaweed","dumpling","gyoza","wonton","fish sauce","oyster sauce","sesame oil","sesame","curry paste","tofu","tempeh","mirin","dashi","wasabi","sriracha","sambal","laksa","pho","jin ramen","shin ramen"],
  alcohol:["wine","beer","vodka","whisky","whiskey","gin","rum","soju","sake","cider","champagne","prosecco","tequila"],
  health:["vitamin","panadol","paracetamol","ibuprofen","medicine","bandage","band-aid","plaster","supplement","probiotic","sunscreen","cough","lozenge","melatonin","fish oil","magnesium"],
};
function guessCat(name){ const n=name.toLowerCase();
  for(const[c,w] of Object.entries(DICT)) if(w.some(x=>n.includes(x))) return c; return null; }

function parseEntry(raw){ let s=raw.trim(); let m=s.match(/^(\d+)\s*[x×]?\s+(.+)$/i);
  if(m) return {qty:parseInt(m[1],10)||1,name:m[2].trim()};
  m=s.match(/^(.+?)\s*[x×]\s*(\d+)$/i); if(m) return {qty:parseInt(m[2],10)||1,name:m[1].trim()};
  return {qty:1,name:s}; }

const uid = () => Math.random().toString(36).slice(2,9)+Date.now().toString(36);

/* ---- list code: from URL, else remembered on this device, else new ---- */
const params = new URLSearchParams(location.search);
const LS_LASTLIST = "ml_lastlist";
let listCode = params.get("list") || localStorage.getItem(LS_LASTLIST) || uid().slice(0,8);
localStorage.setItem(LS_LASTLIST, listCode);
if(params.get("list") !== listCode){ params.set("list", listCode);
  history.replaceState(null,"",location.pathname+"?"+params.toString()); }

const LS = { me:"ml_me", collapse:"ml_collapse_"+listCode, cache:"ml_cache_"+listCode };
let me = localStorage.getItem(LS.me) || null;
let collapse = JSON.parse(localStorage.getItem(LS.collapse) || '{"cats":[],"ba":false}');
let density = parseFloat(localStorage.getItem("ml_density")||"1") || 1;
function setDensity(d){ density=Math.min(1.3,Math.max(0.7,Math.round(d*10)/10)); localStorage.setItem("ml_density",density); render(); }
let theme = localStorage.getItem("ml_theme") || "light";
function applyTheme(){ document.body.classList.toggle("dark", theme==="dark"); }
function toggleTheme(){ theme = theme==="dark" ? "light" : "dark"; localStorage.setItem("ml_theme", theme); applyTheme(); render(); }
applyTheme();

let state = { items:[], buyAgain:[], members:[], categories:null };
try { const c = JSON.parse(localStorage.getItem(LS.cache) || "null"); if(c) state = c; } catch(e){}
let toast=null, catEntry=null, editing=null, configured=false;

function ensureCats(){ if(!Array.isArray(state.categories) || !state.categories.length){
  state.categories = DEFAULT_CATS.map(c=>({id:c.id,label:c.label,color:c.color,emoji:c.emoji})); } }
function catList(){ ensureCats(); return state.categories; }
function CAT(id){ return catList().find(c=>c.id===id) || DEFAULT_CATS.find(c=>c.id===id) || DEFAULT_CATS[DEFAULT_CATS.length-1]; }

/* dynamic label→id map so renamed categories still parse on paste */
function labelMap(){ const m={}; DEFAULT_CATS.forEach(c=>m[c.label.toLowerCase()]=c.id);
  catList().forEach(c=>m[c.label.toLowerCase()]=c.id);
  Object.assign(m,{veg:"vegetable",vegetables:"vegetable",veggies:"vegetable",fruits:"fruit"}); return m; }
function parseInput(text){ const map=labelMap();
  const labels=Object.keys(map).map(s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
  const re=new RegExp('\\s*\\b('+labels+')\\s*:','gi');
  const norm=text.replace(re,(m,l)=>'\n'+l+':');
  const out=[];
  for(const raw of norm.split(/\n/)){ const line=raw.trim(); if(!line) continue;
    let forced=null,rest=line; const c=line.indexOf(":");
    if(c!==-1){ const lab=line.slice(0,c).trim().toLowerCase(); if(map[lab]){ forced=map[lab]; rest=line.slice(c+1);} }
    for(const tok of rest.split(",").map(s=>s.trim()).filter(Boolean)){ const{qty,name}=parseEntry(tok); if(name) out.push({name,qty,cat:forced}); }
  } return out; }

/* ---- Firebase ---- */
let db=null, listRef=null, applyingRemote=false;
try {
  if(firebaseConfig.apiKey !== "REPLACE_ME"){
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    listRef = doc(db, "lists", listCode);
    configured = true;
    onSnapshot(listRef, snap => {
      if(snap.exists()){ const d = snap.data();
        state = { items:d.items||[], buyAgain:d.buyAgain||[], members:d.members||[], categories:d.categories||null }; }
      ensureCats();
      try { localStorage.setItem(LS.cache, JSON.stringify(state)); } catch(e){}
      applyingRemote = true; render(); applyingRemote = false;
    }, err => { console.error(err); showToast("⚠︎ Can't read database — publish Firestore rules"); });
  }
} catch(e){ console.error(e); }

let __saveWarned = 0;
async function save(){
  try { localStorage.setItem(LS.cache, JSON.stringify(state)); } catch(e){}
  if(!configured) return;
  try { await setDoc(listRef, state); }
  catch(e){ console.error(e);
    if(Date.now()-__saveWarned > 5000){ __saveWarned = Date.now(); showToast("⚠︎ Not syncing — check Firestore rules"); } }
}
function showToast(msg){ toast=msg; render(); setTimeout(()=>{ toast=null; render(); },1700); }

/* ---- actions ---- */
function addEntries(text, override){
  const parsed = parseInput(text); if(!parsed.length) return;
  for(const e of parsed){
    const cat = override || e.cat;
    const ex = state.items.find(i=>!i.checked && i.name.toLowerCase()===e.name.toLowerCase());
    if(ex){ if(e.qty>1) ex.qty=(ex.qty||1)+e.qty; continue; }
    if(cat){ state.items.push({id:uid(),name:e.name,qty:e.qty,cat,checked:false,by:me}); }
    else { const g=guessCat(e.name); state.items.push({id:uid(),name:e.name,qty:e.qty,cat:g||"others",checked:false,by:me}); }
  }
  save(); render();
}
function toggleItem(id){ const it=state.items.find(i=>i.id===id); if(it){ if(navigator.vibrate) navigator.vibrate(8); it.checked=!it.checked; save(); render(); } }
function moveToBuyAgain(entries){
  for(const e of entries){ const k=e.name.toLowerCase()+"|"+e.cat;
    state.buyAgain = state.buyAgain.filter(x=>(x.name.toLowerCase()+"|"+x.cat)!==k);
    state.buyAgain.unshift({name:e.name,cat:e.cat,qty:e.qty||1}); }
  state.buyAgain = state.buyAgain.slice(0,80);
}
function sweep(){ const checked=state.items.filter(i=>i.checked);
  moveToBuyAgain(checked.map(i=>({name:i.name,cat:i.cat,qty:i.qty||1})));
  state.items = state.items.filter(i=>!i.checked);
  save(); render(); showToast(checked.length+" cleared → Buy again"); }
function restore(name,cat){
  const entry = state.buyAgain.find(x=>x.name===name && x.cat===cat) || {name,cat,qty:1};
  const ex = state.items.find(i=>!i.checked && i.name.toLowerCase()===name.toLowerCase() && i.cat===cat);
  if(!ex){ state.items.push({id:uid(),name:entry.name,qty:entry.qty||1,cat:entry.cat,checked:false,by:me}); }
  state.buyAgain = state.buyAgain.filter(x=>!(x.name.toLowerCase()===name.toLowerCase() && x.cat===cat));
  save(); render();
}

/* item edit */
function saveEdit(){ if(!editing||!editing.name.trim()) return;
  const it=state.items.find(i=>i.id===editing.id);
  if(it){ it.name=editing.name.trim(); it.qty=Math.max(1,editing.qty||1); it.cat=editing.cat; }
  editing=null; save(); render(); }
function removeEditing(){ moveToBuyAgain([{name:editing.name,cat:editing.cat,qty:editing.qty||1}]);
  state.items = state.items.filter(i=>i.id!==editing.id); editing=null; save(); render(); }
function deleteItemEditing(){ state.items = state.items.filter(i=>i.id!==editing.id); editing=null; save(); render(); }

/* buy-again edit */
function saveBA(){ const nm=(editing.name||"").trim(); if(!nm) return; const cat=editing.cat; const qty=Math.max(1,editing.qty||1);
  state.buyAgain = state.buyAgain.filter(x=>!(x.name===editing.origName && x.cat===editing.origCat));
  if(!state.buyAgain.some(x=>x.name.toLowerCase()===nm.toLowerCase() && x.cat===cat)) state.buyAgain.unshift({name:nm,cat,qty});
  editing=null; save(); render(); }
function removeBAfromSheet(){ state.buyAgain = state.buyAgain.filter(x=>!(x.name===editing.origName && x.cat===editing.origCat));
  editing=null; save(); render(); }
function restoreEditingToList(){ const nm=(editing.name||"").trim()||editing.origName; const cat=editing.cat; const qty=Math.max(1,editing.qty||1);
  state.buyAgain = state.buyAgain.filter(x=>!(x.name===editing.origName && x.cat===editing.origCat));
  const ex=state.items.find(i=>!i.checked && i.name.toLowerCase()===nm.toLowerCase() && i.cat===cat);
  if(!ex) state.items.push({id:uid(),name:nm,qty,cat,checked:false,by:me});

/* category edit */
function moveCat(id, ni){ const cs=catList(); const i=cs.findIndex(c=>c.id===id);
  if(i<0||ni<0||ni>=cs.length) return; const [c]=cs.splice(i,1); cs.splice(ni,0,c); save(); render(); }
function saveCatEdit(){ const c=catList().find(x=>x.id===editing.id);
  if(c){ const nm=(editing.label||"").trim(); if(nm) c.label=nm; } editing=null; save(); render(); }
function removeCat(id){ const cs=catList(); if(cs.length<=1){ showToast("Keep at least one category"); return; }
  const target=cs.find(c=>c.id!==id).id;
  if(!confirm('Remove this category? Its items move to "'+CAT(target).label+'".')) return;
  state.items.forEach(it=>{ if(it.cat===id) it.cat=target; });
  state.buyAgain.forEach(e=>{ if(e.cat===id) e.cat=target; });
  state.categories = cs.filter(c=>c.id!==id);
  editing=null; save(); render(); }

function join(name){ const c=name.trim(); if(!c) return;
  if(!state.members.includes(c)){ if(state.members.length>=4) return; state.members.push(c); }
  me=c; localStorage.setItem(LS.me,c); save(); render(); }
function toggleCat(id){ collapse.cats = collapse.cats.includes(id) ? collapse.cats.filter(x=>x!==id) : [...collapse.cats,id];
  localStorage.setItem(LS.collapse, JSON.stringify(collapse)); render(); }
function toggleBA(){ collapse.ba=!collapse.ba; localStorage.setItem(LS.collapse, JSON.stringify(collapse)); render(); }

/* ---- voice input (Web Speech API) ---- */
let recog=null, listening=false, micFinal="";
function setMicUI(on){ const b=document.getElementById("micBtn"); if(b) b.style.backgroundImage = on ? "url('mic-on.png')" : "";
  const f=micField(); if(f) f.style.color = on ? "var(--accent)" : ""; }
function micField(){ return document.getElementById("mainInput"); }
function grow(el){ if(!el) return; el.style.height="auto"; el.style.height=Math.min(el.scrollHeight+4,180)+"px"; }
function suggestPool(){
  const seen=new Set(), out=[];
  const add=n=>{ const k=(n||"").toLowerCase().trim(); if(k && !seen.has(k)){ seen.add(k); out.push(n); } };
  state.buyAgain.forEach(e=>add(e.name));   // recently bought first
  state.items.forEach(i=>add(i.name));      // already on the list
  Object.values(DICT).forEach(arr=>arr.forEach(add)); // common groceries fallback
  return out;
}
function renderSuggest(){
  const box=document.getElementById("suggest"), mi=micField(); if(!box||!mi){ return; }
  const v=mi.value, idx=Math.max(v.lastIndexOf(","), v.lastIndexOf("\n"));
  const frag=v.slice(idx+1).trim().toLowerCase();
  if(frag.length<1){ box.innerHTML=""; return; }
  const pool=suggestPool();
  const starts=pool.filter(n=>n.toLowerCase().startsWith(frag));
  const incl=pool.filter(n=>!n.toLowerCase().startsWith(frag) && n.toLowerCase().includes(frag));
  const list=[...starts,...incl].filter(n=>n.toLowerCase()!==frag).slice(0,8);
  if(!list.length){ box.innerHTML=""; return; }
  box.innerHTML=list.map(n=>`<button class="sugchip" data-sug="${esc(n)}">${esc(n)}</button>`).join("");
  box.querySelectorAll("[data-sug]").forEach(b=>{
    b.onpointerdown=e=>e.preventDefault();   // keep keyboard up
    b.onclick=()=>{ const name=b.dataset.sug; const cur=mi.value;
      const i=Math.max(cur.lastIndexOf(","), cur.lastIndexOf("\n"));
      const head=i>=0 ? cur.slice(0,i+1).replace(/\s*$/,"")+" " : "";
      mi.value=head+name+", "; grow(mi); mi.focus(); box.innerHTML=""; };
  });
}
function startMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showToast("Voice input isn't supported here — tap the 🎤 on your keyboard instead"); return; }
  const mi = micField(); if(!mi) return;
  micFinal = mi.value ? mi.value.replace(/\s*,?\s*$/,"")+", " : "";
  recog = new SR(); recog.lang = navigator.language || "en-US"; recog.interimResults = true; recog.continuous = false;
  recog.onresult = e => {
    let interim = "";
    for(let i=e.resultIndex; i<e.results.length; i++){ const r=e.results[i]; const tx=(r[0].transcript||"").trim();
      if(r.isFinal){ if(tx) micFinal += tx + ", "; } else { interim += r[0].transcript; } }
    const m=micField(); if(m){ m.value = (micFinal + interim).replace(/,\s*,/g, ", "); grow(m); }
  };
  recog.onerror = ev => {
    if(ev.error==="not-allowed"||ev.error==="service-not-allowed"){ showToast("Allow microphone access to use voice input"); listening=false; }
    else if(ev.error==="no-speech"){ /* keep listening */ }
    else { showToast("Voice error: "+ev.error); }
  };
  recog.onend = () => {
    if(listening){ try{ recog.start(); }catch(e){ listening=false; setMicUI(false); } }
    else { setMicUI(false); const m=micField(); if(m) m.value=m.value.replace(/,\s*$/,""); }
  };
  try { recog.start(); listening=true; setMicUI(true); showToast("Listening… tap 🎤 again to stop"); }
  catch(e){ listening=false; setMicUI(false); showToast("Couldn't start voice input"); }
}
function stopMic(){ listening=false; if(recog){ try{ recog.stop(); }catch(e){} }
  setMicUI(false); const m=micField(); if(m) m.value=m.value.replace(/,\s*$/,""); }
function toggleMic(){ if(listening) stopMic(); else startMic(); }

function pressStart(){ longFired=false; pressTimer=setTimeout(()=>{ longFired=true; if(navigator.vibrate)navigator.vibrate(10); },450); }

function wire(){
  const mi=app.querySelector("#mainInput"), ma=app.querySelector("#mainAdd");
  if(mi){ grow(mi); mi.oninput=()=>{ grow(mi); renderSuggest(); };
    mi.onkeydown=e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); stopMic(); addEntries(mi.value,null); mi.value=""; grow(mi); document.getElementById("suggest").innerHTML=""; mi.focus(); } };
    mi.onpaste=e=>{ const t=(e.clipboardData||window.clipboardData).getData("text");
      const looksLikeBlock = t && (t.indexOf("\n")>=0 || /\b(meat|fruit|vegetable|veg|fresh|bulk|asian|alcohol|health|others)\s*:/i.test(t) || t.split(",").length>2);
      if(looksLikeBlock){ e.preventDefault(); addEntries(t,null); mi.value=""; grow(mi); document.getElementById("suggest").innerHTML=""; } }; }
  if(ma){ ma.onpointerdown=e=>e.preventDefault(); ma.onclick=()=>{ stopMic(); addEntries(mi.value,null); mi.value=""; grow(mi); const sg=document.getElementById("suggest"); if(sg) sg.innerHTML=""; mi.focus(); }; }
  const mb=app.querySelector("#micBtn"); if(mb){ mb.onclick=toggleMic; setMicUI(listening); }

  /* item pills: tap = check, hold = edit */
  app.querySelectorAll("[data-pill]").forEach(b=>{ const id=b.dataset.pill;
    b.oncontextmenu=e=>e.preventDefault();
    b.onpointerdown=pressStart; b.onpointerleave=pressCancel; b.onpointercancel=pressCancel;
    b.onpointerup=()=>{ pressCancel(); const it=state.items.find(i=>i.id===id); if(!it) return;
      if(longFired){ editing={kind:"item", ...it}; render(); } else { toggleItem(id); } }; });

  /* category header: tap = collapse, hold = edit/reorder/remove */
  app.querySelectorAll("[data-cat]").forEach(b=>{ const id=b.dataset.cat;
    const has=state.items.some(i=>i.cat===id);
    b.oncontextmenu=e=>e.preventDefault();
    b.onpointerdown=pressStart; b.onpointerleave=pressCancel; b.onpointercancel=pressCancel;
    b.onpointerup=()=>{ pressCancel(); if(longFired){ const c=CAT(id); editing={kind:"cat", id, label:c.label}; render(); }
      else if(has){ toggleCat(id); } }; });

  app.querySelectorAll("[data-add]").forEach(b=>{ const id=b.dataset.add;
    b.onclick=()=>{ catEntry = catEntry===id?null:id; render(); const ci=app.querySelector("#catInput"); if(ci) ci.focus(); }; });
  const ci=app.querySelector("#catInput"), cab=app.querySelector("#catAddBtn");
  if(ci){ ci.focus(); grow(ci); ci.oninput=()=>grow(ci);
    ci.onkeydown=e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); addEntries(ci.value,catEntry); ci.value=""; grow(ci); ci.focus(); } }; }
  if(cab){ cab.onpointerdown=e=>e.preventDefault(); cab.onclick=()=>{ const v=app.querySelector("#catInput").value; addEntries(v,catEntry); render(); const x=app.querySelector("#catInput"); if(x){ x.focus(); grow(x); } }; }

  const sb=app.querySelector("#sweepBtn"); if(sb) sb.onclick=sweep;
  const bh=app.querySelector("#baHead"); if(bh) bh.onclick=toggleBA;

  /* buy-again: tap = restore, hold = edit (remove lives inside the edit popup) */
  app.querySelectorAll(".ba-restore").forEach(b=>{ const [name,cat]=b.dataset.restore.split("|");
    b.oncontextmenu=e=>e.preventDefault();
    b.onpointerdown=pressStart; b.onpointerleave=pressCancel; b.onpointercancel=pressCancel;
    b.onpointerup=()=>{ pressCancel();
      if(longFired){ const en=state.buyAgain.find(x=>x.name===name && x.cat===cat); editing={kind:"ba", name, cat, qty:(en?en.qty||1:1), origName:name, origCat:cat}; render(); }
      else { restore(name,cat); } }; });
  const cba=app.querySelector("#clearBA"); if(cba) cba.onclick=()=>{ state.buyAgain=[]; save(); render(); };

  const dm=app.querySelector("#denMinus"); if(dm) dm.onclick=()=>setDensity(density-0.1);
  const dp=app.querySelector("#denPlus"); if(dp) dp.onclick=()=>setDensity(density+0.1);
  const tb=app.querySelector("#themeBtn"); if(tb) tb.onclick=toggleTheme;

  const cl=app.querySelector("#copyLink2"); if(cl) cl.onclick=copyLink;
  const su=app.querySelector("#switchUser"); if(su) su.onclick=()=>{ localStorage.removeItem(LS.me); me=null; render(); };

  if(editing){
    const bg=app.querySelector("#sheetBg"); if(bg) bg.onclick=()=>{ editing=null; render(); };
    const sh=app.querySelector("#sheet"); if(sh) sh.onclick=e=>e.stopPropagation();
    if(editing.kind==="cat"){
      const cn=app.querySelector("#catName"); if(cn) cn.oninput=e=>editing.label=e.target.value;
      const mu=app.querySelector("#moveUp"); if(mu) mu.onclick=()=>{ const cs=catList(); const i=cs.findIndex(c=>c.id===editing.id); moveCat(editing.id,i-1); };
      const md=app.querySelector("#moveDown"); if(md) md.onclick=()=>{ const cs=catList(); const i=cs.findIndex(c=>c.id===editing.id); moveCat(editing.id,i+1); };
      const cr=app.querySelector("#catRemove"); if(cr) cr.onclick=()=>removeCat(editing.id);
      const csv=app.querySelector("#catSave"); if(csv) csv.onclick=saveCatEdit;
    } else {
      const en=app.querySelector("#editName"); if(en) en.oninput=e=>editing.name=e.target.value;
      const qm=app.querySelector("#qMinus"); if(qm) qm.onclick=()=>{ editing.qty=Math.max(1,(editing.qty||1)-1); render(); };
      const qp=app.querySelector("#qPlus"); if(qp) qp.onclick=()=>{ editing.qty=(editing.qty||1)+1; render(); };
      app.querySelectorAll("[data-ec]").forEach(b=>b.onclick=()=>{ editing.cat=b.dataset.ec; render(); });
      const sec=app.querySelector("#secBtn"); if(sec) sec.onclick=()=> editing.kind==="item" ? removeEditing() : restoreEditingToList();
      const del=app.querySelector("#delBtn"); if(del) del.onclick=()=> editing.kind==="item" ? deleteItemEditing() : removeBAfromSheet();
      const sv=app.querySelector("#saveBtn"); if(sv) sv.onclick=()=> editing.kind==="item" ? saveEdit() : saveBA();
    }
  }
}

render();
</script>
</body>
</html>
