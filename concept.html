<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="robots" content="noindex" />
<link rel="icon" href="img/icon-180.png" />
<title>Pantry — Market List concept</title>
<style>
  /* Sandbox prototype: "one surface, two lenses". Reads the real list cache read-only;
     its own state stays on this phone (ml_concept_<code>). No sync, no Firebase. */
  @font-face{ font-family:'Outfit'; font-style:normal; font-weight:400 800; font-display:swap;
    src:url('outfit-latin.woff2') format('woff2'); }
  :root{
    --ink:#21351F; --paper:#F2F6EE; --accent:#E2502C; --card:#ffffff; --line:#DCE5D7;
    --chip:#E1E9DC; --muted:#5C6C59; --muted2:#66766A; --btn:#21351F; --btn-text:#fff;
    /* Liquid-glass WEB APPROXIMATION (no official Apple web framework) */
    --glass-bg:rgba(255,255,255,.58); --glass-brd:rgba(255,255,255,.5); --glass-hi:rgba(255,255,255,.7); --glass-blur:16px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --ink:#E7EEE5; --paper:#141C18; --card:#1E2B25; --line:#33433B; --chip:#27352E;
      --muted:#9DB0A4; --muted2:#7E9286; --btn:#2F4A2C; --btn-text:#EAF2E7;
      --glass-bg:rgba(22,30,26,.66); --glass-brd:rgba(255,255,255,.12); --glass-hi:rgba(255,255,255,.14); }
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; background:var(--paper); color:var(--ink); min-height:100dvh;
    font-family:'Outfit',-apple-system,system-ui,sans-serif; }
  button{ font-family:inherit; cursor:pointer; }
  .wrap{ max-width:480px; margin:0 auto; padding:0 14px 140px; }
  .glass{ background:var(--glass-bg); -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(160%);
    backdrop-filter:blur(var(--glass-blur)) saturate(160%); border:1px solid var(--glass-brd);
    box-shadow: inset 0 1px 0 var(--glass-hi), 0 10px 30px rgba(20,30,22,.2); }
  @supports not (backdrop-filter: blur(1px)){ .glass{ background:var(--paper); } }
  @media (prefers-reduced-transparency: reduce){ .glass{ background:var(--paper); backdrop-filter:none; -webkit-backdrop-filter:none; } }
  .top{ position:fixed; top:0; left:0; right:0; z-index:30; border-left:none; border-right:none; border-top:none; border-radius:0;
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px; }
  .top-in{ max-width:452px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .ttl{ font-weight:800; font-size:19px; letter-spacing:-.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ttl .dot{ color:var(--accent); }
  .lens{ flex:none; display:inline-flex; background:var(--chip); border-radius:999px; padding:3px; }
  .lens button{ border:none; background:transparent; color:var(--muted); font-weight:800; font-size:13px;
    padding:8px 16px; border-radius:999px; transition:background .15s ease, color .15s ease; }
  .lens button.on{ background:var(--accent); color:#fff; }
  .sandnote{ margin:0 0 12px; padding:9px 12px; border-radius:12px; background:var(--chip); color:var(--muted);
    font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .sandnote button{ flex:none; border:none; background:transparent; color:var(--muted); font-weight:800; font-size:14px; }
  .cathead{ display:flex; align-items:center; gap:7px; margin:16px 2px 8px; font-weight:800; font-size:13px; }
  .cathead .cdot{ width:9px; height:9px; border-radius:50%; }
  .cathead .cnum{ margin-left:auto; color:var(--muted2); font-size:12px; font-weight:700; }
  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .tile{ position:relative; border:1.5px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:16px; aspect-ratio:1/1.02; padding:8px 6px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:6px; overflow:hidden;
    transition:transform .1s ease, background .15s ease, border-color .15s ease; }
  .tile:active{ transform:scale(.95); }
  .tile .tem{ font-size:30px; line-height:1; }
  .tile .tnm{ font-size:12px; font-weight:700; line-height:1.15; text-align:center; max-width:100%;
    overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .tile.on{ color:#fff; border-color:transparent; }
  .tile.on .tnm{ color:#fff; }
  .tile .tq{ position:absolute; top:6px; right:6px; min-width:20px; height:20px; padding:0 6px; border-radius:999px;
    background:rgba(255,255,255,.92); color:var(--ink); font-size:11px; font-weight:800;
    display:none; align-items:center; justify-content:center; }
  .tile.on .tq{ display:flex; }
  .rows{ display:flex; flex-direction:column; gap:8px; }
  .row{ display:flex; align-items:center; gap:11px; width:100%; text-align:left; border:1.5px solid var(--line);
    background:var(--card); color:var(--ink); border-radius:16px; padding:0 14px; min-height:58px;
    font-size:16px; font-weight:700; border-left-width:4px; transition:transform .1s ease, opacity .2s ease; }
  .row:active{ transform:scale(.98); }
  .row .rc{ flex:none; width:26px; height:26px; border-radius:50%; border:2px solid var(--muted2);
    display:flex; align-items:center; justify-content:center; color:transparent; font-size:14px; font-weight:900; }
  .row .rem{ flex:none; font-size:19px; }
  .row .rnm{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .row .rmeta{ flex:none; font-size:13px; font-weight:800; }
  .row.done{ opacity:.55; }
  .row.done .rc{ background:#2F9E44; border-color:#2F9E44; color:#fff; }
  .row.done .rnm{ text-decoration:line-through; color:var(--muted); }
  .shophead{ display:flex; align-items:center; gap:12px; margin:0 0 14px; }
  .ring{ flex:none; width:52px; height:52px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:var(--ink);
    background:conic-gradient(var(--accent) calc(var(--p)*1%), var(--chip) 0); }
  .ring i{ width:40px; height:40px; border-radius:50%; background:var(--paper); display:flex; align-items:center;
    justify-content:center; font-style:normal; }
  .shophead .st{ flex:1; }
  .shophead .st b{ display:block; font-size:16px; }
  .shophead .st span{ font-size:12.5px; color:var(--muted); font-weight:600; }
  .finish{ border:none; background:var(--btn); color:var(--btn-text); font-weight:800; font-size:14px;
    padding:12px 18px; border-radius:999px; }
  .inlbl{ margin:18px 2px 8px; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
  .bot{ position:fixed; left:12px; right:12px; bottom:calc(12px + env(safe-area-inset-bottom)); z-index:30;
    max-width:456px; margin:0 auto; border-radius:999px; padding:8px 10px; display:flex; align-items:center; gap:8px; }
  .bot input{ flex:1; min-width:0; border:none; outline:none; background:transparent; color:var(--ink);
    font-family:inherit; font-size:16px; font-weight:600; padding:8px 6px; }
  .bot input::placeholder{ color:var(--muted2); }
  .bot .cnt{ flex:none; min-width:34px; height:34px; padding:0 9px; border-radius:999px; background:var(--accent);
    color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center; }
  .bot .sic{ flex:none; color:var(--muted2); display:flex; padding-left:6px; }
  .qpop-bg{ position:fixed; inset:0; z-index:50; background:rgba(20,30,22,.45); display:flex;
    align-items:flex-end; justify-content:center; }
  .qpop{ width:100%; max-width:480px; border-radius:22px 22px 0 0; padding:18px 18px calc(24px + env(safe-area-inset-bottom));
    background:var(--paper); border:1px solid var(--glass-brd); border-bottom:none; animation:up .2s ease; }
  @keyframes up{ from{ transform:translateY(30px); opacity:0 } to{ transform:none; opacity:1 } }
  .qpop h3{ margin:0 0 12px; font-size:16px; }
  .qrow{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .qstep{ display:inline-flex; align-items:center; border:1.5px solid var(--line); border-radius:12px; background:var(--card); }
  .qstep button{ width:44px; height:44px; border:none; background:transparent; color:var(--ink); font-size:20px; font-weight:800; }
  .qstep span{ min-width:34px; text-align:center; font-weight:800; font-size:17px; }
  .wchips{ display:flex; gap:6px; flex:1; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .wchips button{ flex:none; padding:9px 12px; border-radius:999px; border:1.5px solid var(--line); background:var(--card);
    color:var(--ink); font-weight:700; font-size:13px; }
  .wchips button.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .qacts{ display:flex; gap:8px; }
  .qacts .rm{ flex:none; border:1.5px solid #C24A33; color:#C24A33; background:transparent; font-weight:800;
    padding:12px 16px; border-radius:14px; font-size:14px; }
  .qacts .okb{ flex:1; border:none; background:var(--btn); color:var(--btn-text); font-weight:800; padding:12px; border-radius:14px; font-size:15px; }
  .lensview{ animation:fadein .18s ease; }
  @keyframes fadein{ from{ opacity:0; transform:translateY(6px) } to{ opacity:1; transform:none } }
  .empty{ text-align:center; color:var(--muted); padding:40px 10px; font-weight:600; font-size:14px; }
  @media (prefers-reduced-motion: reduce){ *{ animation-duration:.001ms !important; transition-duration:.001ms !important; } }
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
/* ---------- data: seeded read-only from the real app's cache ---------- */
const params = new URLSearchParams(location.search);
const CODE = params.get("list") || localStorage.getItem("ml_lastlist") || "demo";
const SKEY = "ml_concept_" + CODE;
const DEF_CATS = [
  { id:"meat", label:"Meat", emoji:"🥩", color:"#B5402B" },
  { id:"fruit", label:"Fruit", emoji:"🍌", color:"#C98A06" },
  { id:"vegetable", label:"Vegetable", emoji:"🥦", color:"#3E7C3A" },
  { id:"fresh", label:"Fresh", emoji:"🥛", color:"#2E6FA3" },
  { id:"bulk", label:"Bulk", emoji:"🧻", color:"#6B5CA5" },
  { id:"others", label:"Others", emoji:"🛒", color:"#5B6770" },
];
const STAPLES = { meat:["chicken","beef","salmon"], fruit:["banana","apple","lemon"],
  vegetable:["broccoli","carrot","tomato","onion"], fresh:["milk","egg","cheese","bread","butter"],
  bulk:["rice","pasta","coffee","toilet paper"], others:[] };
const EMOJI = [["paper towel","🧻"],["toilet","🧻"],["ice cream","🍦"],["chicken","🍗"],["beef","🥩"],["steak","🥩"],["pork","🥓"],["bacon","🥓"],
  ["salmon","🐟"],["fish","🐟"],["prawn","🦐"],["milk","🥛"],["egg","🥚"],["cheese","🧀"],["butter","🧈"],["yoghurt","🥛"],["yogurt","🥛"],["bread","🍞"],
  ["banana","🍌"],["apple","🍎"],["orange","🍊"],["lemon","🍋"],["grape","🍇"],["strawberr","🍓"],["berr","🫐"],["mango","🥭"],["avocado","🥑"],
  ["tomato","🍅"],["carrot","🥕"],["potato","🥔"],["onion","🧅"],["garlic","🧄"],["broccoli","🥦"],["corn","🌽"],["mushroom","🍄"],["cucumber","🥒"],
  ["lettuce","🥬"],["spinach","🥬"],["rice","🍚"],["pasta","🍝"],["noodle","🍜"],["coffee","☕"],["tea","🍵"],["beer","🍺"],["wine","🍷"],["water","💧"],
  ["chocolate","🍫"],["honey","🍯"],["salt","🧂"],["sugar","🧂"],["flour","🌾"],["oil","🫒"],["soap","🧼"],["shampoo","🧴"],["toothpaste","🪥"]];
const CATRANK = { meat:1, vegetable:2, fruit:3, bulk:17, fresh:23, others:90, health:97, asian:98, alcohol:99 };
function emojiFor(name, cat){ const n=(name||"").toLowerCase();
  for(const [k,e] of EMOJI){ if(n.includes(k)) return e; }
  const c=CATS.find(x=>x.id===cat); return (c&&c.emoji)||"🛒"; }
function guessCat(name){ const n=(name||"").toLowerCase();
  for(const c of CATS){ const ws=STAPLES[c.id]||[]; if(ws.some(w=>n.includes(w))) return c.id; }
  const oth=CATS.find(c=>c.id==="others");                    // fall back to a category that actually exists on this list
  return oth ? oth.id : CATS[CATS.length-1].id; }
const esc = s => String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const cap = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
const key = (n,c) => (n||"").toLowerCase().trim()+"|"+c;

let cache=null; try{ cache = JSON.parse(localStorage.getItem("ml_cache_"+CODE) || "null"); }catch(e){}
const CATS = (cache && Array.isArray(cache.categories) && cache.categories.length)
  ? cache.categories.map(c=>({id:c.id,label:c.label,emoji:c.emoji||"🛒",color:c.color||"#5B6770"}))
  : DEF_CATS;
const LISTNAME = (cache && cache.name) || "Pantry";

/* sandbox state — never writes back to ml_cache_* */
let S = { on:{}, checked:{}, extra:{}, seeded:false, note:true };
try{ const s=JSON.parse(localStorage.getItem(SKEY)||"null"); if(s && typeof s==="object") S=Object.assign(S,s); }catch(e){}
function saveS(){ try{ localStorage.setItem(SKEY, JSON.stringify(S)); }catch(e){} }

/* pantry = cache items ∪ buy-again ∪ staples ∪ sandbox extras */
function pantry(){
  const map={};
  const put=(n,c,q,w)=>{ const k=key(n,c); if(!n || map[k]) return; map[k]={ k, name:n, cat:c, qty:q||1, weight:w||"" }; };
  if(cache){ (cache.items||[]).forEach(i=>put(i.name,i.cat,i.qty,i.weight)); (cache.buyAgain||[]).forEach(e=>put(e.name,e.cat,e.qty,e.weight)); }
  for(const c of CATS) (STAPLES[c.id]||[]).forEach(n=>put(n,c.id,1,""));
  Object.values(S.extra||{}).forEach(x=>put(x.name,x.cat,1,x.weight));
  return Object.values(map);
}
/* one-time seed: whatever is on the real list right now starts "on" in the sandbox */
if(!S.seeded){ S.seeded=true;
  if(cache) (cache.items||[]).forEach(i=>{ if(!i.checked) S.on[key(i.name,i.cat)]={ qty:i.qty||1, weight:i.weight||"" }; });
  saveS(); }

let lens = "plan";           /* "plan" | "shop" */
let qpop = null;             /* pantry key being quantity-edited */
let filter = "";

/* ---------- rendering ---------- */
const app = document.getElementById("app");
function onCount(){ return Object.keys(S.on).length; }
function render(){
  const P = pantry();
  const f = filter.trim().toLowerCase();
  let body = "";
  if(lens==="plan"){
    body = CATS.map(c=>{
      const items = P.filter(p=>p.cat===c.id && (!f || p.name.toLowerCase().includes(f)));
      if(!items.length) return "";
      const onN = items.filter(p=>S.on[p.k]).length;
      return `<div class="cathead"><span class="cdot" style="background:${c.color}"></span>${esc(c.label)}<span class="cnum">${onN?onN+" on list":""}</span></div>
        <div class="grid">${items.map(p=>{
          const on=S.on[p.k]; const q=on?(on.qty||1):0; const w=on?(on.weight||""):"";
          return `<button class="tile ${on?'on':''}" data-tile="${esc(p.k)}" style="${on?`background:${c.color}`:""}">
            <span class="tq">${q>1?q+"×":""}${w?(q>1?" ":"")+esc(w):""}${(q<=1&&!w)?"✓":""}</span>
            <span class="tem">${emojiFor(p.name,p.cat)}</span><span class="tnm">${esc(cap(p.name))}</span>
          </button>`; }).join("")}</div>`;
    }).join("") || `<div class="empty">Nothing matches. Press Enter to add it to your pantry.</div>`;
  } else {
    const on = P.filter(p=>S.on[p.k]).sort((a,b)=>(CATRANK[a.cat]||50)-(CATRANK[b.cat]||50) || a.name.localeCompare(b.name));
    const todo = on.filter(p=>!S.checked[p.k]), got = on.filter(p=>S.checked[p.k]);
    const pct = on.length ? Math.round(got.length/on.length*100) : 0;
    const row = p=>{ const c=CATS.find(x=>x.id===p.cat)||{}; const o=S.on[p.k]||{}; const done=!!S.checked[p.k];
      const meta=[(o.qty||1)>1?(o.qty+"×"):"", o.weight||""].filter(Boolean).join(" ");
      return `<button class="row ${done?'done':''}" data-row="${esc(p.k)}" style="border-left-color:${c.color||'var(--line)'}">
        <span class="rc">${done?"✓":""}</span><span class="rem">${emojiFor(p.name,p.cat)}</span>
        <span class="rnm">${esc(cap(p.name))}</span>${meta?`<span class="rmeta" style="color:${c.color||'inherit'}">${esc(meta)}</span>`:""}</button>`; };
    body = `<div class="shophead">
        <div class="ring" style="--p:${pct}"><i>${pct}%</i></div>
        <div class="st"><b>${todo.length} to get</b><span>${got.length} in the cart</span></div>
        ${got.length?`<button class="finish" id="finish">Finish</button>`:""}
      </div>`
      + (on.length ? `<div class="rows">${todo.map(row).join("")}</div>
          ${got.length?`<div class="inlbl">In the cart</div><div class="rows">${got.map(row).join("")}</div>`:""}`
        : `<div class="empty">Nothing on the list. Flip to Plan and tap tiles to build it.</div>`);
  }
  app.innerHTML = `
    <div class="top glass"><div class="top-in">
      <span class="ttl">${esc(LISTNAME)}<span class="dot">.</span></span>
      <div class="lens" role="tablist">
        <button data-lens="plan" class="${lens==='plan'?'on':''}">Plan</button>
        <button data-lens="shop" class="${lens==='shop'?'on':''}">Shop</button>
      </div>
    </div></div>
    <div class="wrap" style="padding-top:86px">
      ${S.note?`<div class="sandnote"><span>🧪 Concept sandbox. Changes stay on this phone; your real list is untouched.</span><button id="noteX" aria-label="Dismiss">×</button></div>`:""}
      <div class="lensview" id="lensview">${body}</div>
    </div>
    ${lens==='plan'?`<div class="bot glass">
      <span class="sic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg></span>
      <input id="find" placeholder="I need…" autocomplete="off" enterkeyhint="done" value="${esc(filter)}" />
      <span class="cnt">${onCount()}</span>
    </div>`:""}
    ${qpop!=null?qpopHTML():""}`;
  wire();
}
function qpopHTML(){
  const p = pantry().find(x=>x.k===qpop); if(!p) return "";
  const o = S.on[p.k] || { qty:1, weight:"" };
  const W = ["","100g","200g","300g","500g","750g","1kg","2kg"];
  return `<div class="qpop-bg" id="qbg"><div class="qpop">
    <h3>${emojiFor(p.name,p.cat)} ${esc(cap(p.name))}</h3>
    <div class="qrow">
      <div class="qstep"><button id="qm">−</button><span>${o.qty||1}</span><button id="qp">+</button></div>
      <div class="wchips">${W.map(w=>`<button data-w="${w}" class="${(o.weight||"")===w?'on':''}">${w||"unit"}</button>`).join("")}</div>
    </div>
    <div class="qacts">
      <button class="rm" id="qrm">Take off list</button>
      <button class="okb" id="qok">Done</button>
    </div>
  </div></div>`;
}

/* ---------- interactions ---------- */
let pressT=null, longHit=false;
function wire(){
  document.querySelectorAll("[data-lens]").forEach(b=>b.onclick=()=>{ if(lens!==b.dataset.lens){ lens=b.dataset.lens; qpop=null; render(); } });
  const nx=document.getElementById("noteX"); if(nx) nx.onclick=()=>{ S.note=false; saveS(); render(); };
  document.querySelectorAll("[data-tile]").forEach(b=>{ const k=b.dataset.tile;
    b.oncontextmenu=e=>e.preventDefault();
    b.onpointerdown=()=>{ longHit=false; pressT=setTimeout(()=>{ longHit=true; if(!S.on[k]) S.on[k]={qty:1,weight:""}; qpop=k; saveS(); render(); },450); };
    b.onpointerleave=()=>clearTimeout(pressT); b.onpointercancel=()=>clearTimeout(pressT);
    b.onpointerup=()=>{ clearTimeout(pressT); if(longHit) return;
      if(S.on[k]){ delete S.on[k]; delete S.checked[k]; } else { S.on[k]={qty:1,weight:""}; }
      saveS(); render(); };
  });
  document.querySelectorAll("[data-row]").forEach(b=>b.onclick=()=>{ const k=b.dataset.row;
    if(S.checked[k]) delete S.checked[k]; else S.checked[k]=1; saveS(); render(); });
  const fin=document.getElementById("finish"); if(fin) fin.onclick=()=>{
    for(const k of Object.keys(S.checked)){ delete S.on[k]; } S.checked={}; saveS(); render(); };
  const fi=document.getElementById("find");
  if(fi){ fi.oninput=()=>{ filter=fi.value; render(); const f2=document.getElementById("find"); if(f2){ f2.focus(); f2.setSelectionRange(f2.value.length,f2.value.length); } };
    fi.onkeydown=e=>{ if(e.key==="Enter"){ e.preventDefault(); const t=(fi.value||"").trim(); if(!t) return;
      const c=guessCat(t); const k=key(t,c);
      if(!pantry().some(p=>p.k===k)){ S.extra[k]={name:t,cat:c,weight:""}; }
      S.on[k]={qty:1,weight:""}; filter=""; saveS(); render(); }; } }
  const qbg=document.getElementById("qbg"); if(qbg) qbg.onclick=e=>{ if(e.target===qbg){ qpop=null; render(); } };
  const qok=document.getElementById("qok"); if(qok) qok.onclick=()=>{ qpop=null; render(); };
  const qrm=document.getElementById("qrm"); if(qrm) qrm.onclick=()=>{ delete S.on[qpop]; delete S.checked[qpop]; qpop=null; saveS(); render(); };
  const qm=document.getElementById("qm"); if(qm) qm.onclick=()=>{ const o=S.on[qpop]; if(o){ o.qty=Math.max(1,(o.qty||1)-1); saveS(); render(); } };
  const qp=document.getElementById("qp"); if(qp) qp.onclick=()=>{ const o=S.on[qpop]; if(o){ o.qty=Math.min(999,(o.qty||1)+1); saveS(); render(); } };
  document.querySelectorAll("[data-w]").forEach(b=>b.onclick=()=>{ const o=S.on[qpop]; if(o){ o.weight=(o.weight===b.dataset.w?"":b.dataset.w); saveS(); render(); } });
}
render();
</script>
</body>
</html>
